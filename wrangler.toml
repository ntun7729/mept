name = "mept"
main = "worker.js"
compatibility_date = "2025-05-24"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
NODE_ENV = "production"
LOG_LEVEL = "silent"
AI_BASE_URL = "https://integrate.api.nvidia.com/v1"
AI_MODEL = "z-ai/glm-5.1"
AUDIO_MODEL = "tts-1"
AUDIO_VOICE = "alloy"
