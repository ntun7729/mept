<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEPT English Trainer</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">MEPT practice for new seafarers</p>
      <h1>MEPT English Trainer</h1>
      <p>Generate MEPT-style questions, answer them like a form, listen to audio prompts, and check your answers with an OpenAI-compatible provider.</p>
    </section>

    <section class="panel controls">
      <label>Section
        <select id="section">
          <option value="mixed">Mixed</option>
          <option value="grammar">Grammar</option>
          <option value="reading">Reading</option>
          <option value="listening">Listening</option>
          <option value="writing">Writing</option>
          <option value="speaking">Speaking</option>
        </select>
      </label>
      <label>Difficulty
        <select id="level">
          <option value="starter">Starter</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <label>Questions
        <input id="count" type="number" min="1" max="20" value="8">
      </label>
      <label>Topic
        <input id="topic" type="text" placeholder="e.g. PPE, safety drill, engine room">
      </label>
      <label class="checkbox"><input id="includeAudio" type="checkbox"> Include listening scripts</label>
      <button id="generate">Generate questions</button>
    </section>

    <section id="status" class="status"></section>
    <form id="quiz" class="quiz"></form>
    <section id="result" class="result"></section>
  </main>
  <script src="/app.js" type="module"></script>
</body>
</html>
